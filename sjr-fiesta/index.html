function timeAgo(dateStr) {
  const days = Math.floor((new Date() - new Date(dateStr)) / 86400000);
  if (days === 0) return "Today";
  if (days === 1) return "Yesterday";
  if (days < 7) return `${days}d ago`;
  if (days < 30) return `${Math.floor(days/7)}w ago`;
  return `${Math.floor(days/30)}mo ago`;
}

function Stars({ rating, size=14, onSelect }) {
  return (
    <div style={{display:"flex",gap:2}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} onClick={onSelect ? ()=>onSelect(s) : undefined}
          style={{fontSize:size, cursor:onSelect?"pointer":"default", color:s<=rating?"#EF9F27":"var(--border)", transition:"color 0.15s"}}>★</span>
      ))}
    </div>
  );
}

function NameBlockFields({ name, block, flat, onUpdate, inputStyle, labelStyle }) {
  return (
    <>
      <div>
        <label style={labelStyle}>Your name *</label>
        <input style={inputStyle} placeholder="e.g. Rahul" value={name}
          onChange={e=>onUpdate("name",e.target.value)}
          onFocus={e=>{e.target.style.borderColor="var(--accent)"}}
          onBlur={e=>{e.target.style.borderColor="var(--border)"}} />
      </div>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}>
          <label style={labelStyle}>Block *</label>
          <select style={{...inputStyle,cursor:"pointer"}} value={block} onChange={e=>onUpdate("block",e.target.value)}>
            <option value="">Select block</option>
            {BLOCKS.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <label style={labelStyle}>Flat number *</label>
          <input style={inputStyle} placeholder="e.g. 304" value={flat}
            onChange={e=>onUpdate("flat",e.target.value.replace(/[^0-9]/g,""))}
            inputMode="numeric"
            onFocus={e=>{e.target.style.borderColor="var(--accent)"}}
            onBlur={e=>{e.target.style.borderColor="var(--border)"}} />
        </div>
      </div>
    </>
  );
}

  return (

      </div>
      <p style={{margin:"4px 0 0",fontSize:13,lineHeight:1.5,color:"var(--text-secondary)"}}>{review.text}</p>
    </div>
  );
}

function ReviewSheet({ rec, onClose, onAddReview, onQuickVouch }) {

  const [reviewText,setReviewText] = useState("");

  const [authorFlat,setAuthorFlat] = useState("");

  const reviews = rec.reviews || [];
  const avgRating = reviews.length>0 ? (reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1) : null;
  const canSubmit = reviewText.trim() && authorName.trim() && authorBlock && authorFlat.trim();

  const submitReview = () => {
    if (!canSubmit) return;
    const author = [authorName.trim(), authorBlock && authorFlat ? `${authorBlock}-${authorFlat}` : authorBlock].filter(Boolean).join(", ");

    setMode("view"); setReviewText(""); setRating(5); setAuthorName(""); setAuthorBlock(""); setAuthorFlat("");
  };

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000,animation:"fadeIn 0.2s ease"}} onClick={onClose}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>

              <h2 style={{margin:0,fontSize:19,fontWeight:700,color:"var(--text-primary)"}}>{rec.name}</h2>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
              <span style={{fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"var(--tag-bg)",color:"var(--tag-text)"}}>{rec.subcategory || cat?.label}</span>

            </div>
            {rec.contact && <div style={{fontSize:13,color:"var(--accent)",marginTop:8,fontWeight:500}}>📞 {rec.contact}</div>}
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,color:"var(--text-tertiary)",cursor:"pointer",padding:4}}>✕</button>
        </div>

        <div style={{background:"var(--rec-bg)",borderRadius:10,padding:"12px 14px",borderLeft:"3px solid var(--accent)",marginBottom:16}}>
          <p style={{margin:"0 0 6px",fontSize:14,lineHeight:1.5,color:"var(--text-secondary)"}}>"{rec.note}"</p>
          <span style={{fontSize:12,color:"var(--text-tertiary)",fontWeight:500}}>— {rec.recommender} · {timeAgo(rec.createdAt)}</span>
        </div>

              <NameBlockFields name={authorName} block={authorBlock} flat={authorFlat} onUpdate={handle} inputStyle={inputStyle} labelStyle={labelStyle} />
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setMode("view")} style={{padding:"10px 18px",fontSize:14,fontWeight:600,border:"none",borderRadius:10,background:"var(--chip-bg)",color:"var(--text-primary)",cursor:"pointer"}}>Cancel</button>
                <button onClick={submitReview} disabled={!canSubmit}
                  style={{flex:1,padding:"10px",fontSize:14,fontWeight:600,border:"none",borderRadius:10,cursor:canSubmit?"pointer":"not-allowed",background:canSubmit?"var(--accent)":"var(--text-tertiary)",color:"#fff",opacity:canSubmit?1:0.6}}>
                  Submit review
                </button>
              </div>
            </div>
          </div>
        )}

        <div>
          <h4 style={{margin:"0 0 4px",fontSize:15,fontWeight:600,color:"var(--text-primary)"}}>Neighbour reviews {reviews.length>0 && `(${reviews.length})`}</h4>
          {reviews.length===0
            ? <div style={{padding:"24px 0",textAlign:"center"}}><p style={{fontSize:14,color:"var(--text-tertiary)",margin:0}}>No reviews yet — be the first!</p></div>
            : reviews.map(r=><ReviewItem key={r.id} review={r} />)}
        </div>
      </div>
    </div>
  );
}

function RecCard({ rec, onUpvote, onTap }) {
  const cat = CATEGORIES.find(c=>c.id===rec.category);
  const reviews = rec.reviews || [];
  const avgRating = reviews.length>0 ? (reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1) : null;
  return (
    <div onClick={()=>onTap(rec)}
      style={{background:"var(--card-bg)",borderRadius:14,padding:"18px 20px",border:"1px solid var(--border)",transition:"box-shadow 0.2s",cursor:"pointer"}}
      onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,0.06)"}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow="none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{fontSize:20}}>{cat?.icon}</span>
            <h3 style={{margin:0,fontSize:17,fontWeight:600,color:"var(--text-primary)",letterSpacing:"-0.01em"}}>{rec.name}</h3>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"8px 0"}}>
            <span style={{background:"var(--tag-bg)",color:"var(--tag-text)",fontSize:12,fontWeight:500,padding:"3px 10px",borderRadius:20}}>{rec.subcategory || cat?.label}</span>
            {rec.location && <span style={{background:"var(--loc-bg)",color:"var(--loc-text)",fontSize:12,fontWeight:500,padding:"3px 10px",borderRadius:20}}>📍 {rec.location}</span>}
          </div>
        </div>
        <button onClick={e=>{e.stopPropagation();onUpvote(rec.id)}}
          style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"var(--upvote-bg)",border:"1px solid var(--upvote-border)",borderRadius:10,padding:"8px 12px",cursor:"pointer",transition:"all 0.15s",minWidth:44}}
          onMouseEnter={e=>{e.currentTarget.style.background="var(--upvote-hover)"}}
          onMouseLeave={e=>{e.currentTarget.style.background="var(--upvote-bg)"}}>
          <span style={{fontSize:16,lineHeight:1}}>▲</span>
          <span style={{fontSize:14,fontWeight:600,color:"var(--accent)"}}>{rec.upvotes}</span>
        </button>
      </div>
      {rec.note && <p style={{margin:"10px 0 0",fontSize:14,lineHeight:1.55,color:"var(--text-secondary)",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>"{rec.note}"</p>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12,paddingTop:10,borderTop:"1px solid var(--border-light)"}}>
        <span style={{fontSize:13,color:"var(--text-tertiary)",fontWeight:500}}>👤 {rec.recommender}</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {reviews.length>0 && <span style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"var(--text-tertiary)",fontWeight:500}}><span style={{color:"#EF9F27"}}>★ {avgRating}</span> · {reviews.length} review{reviews.length!==1?"s":""}</span>}
          <span style={{fontSize:12,color:"var(--text-tertiary)"}}>{timeAgo(rec.createdAt)}</span>
        </div>
      </div>
    </div>
  );
}

function AddForm({ onAdd, onClose }) {
  const [form,setForm] = useState({name:"",category:"doctors",subcategory:"",location:"",contact:"",note:"",authorName:"",authorBlock:"",authorFlat:""});
  const update = (k,v) => setForm(p=>({...p,[k]:v}));
  const canSubmit = form.name.trim() && form.authorName.trim() && form.authorBlock && form.authorFlat.trim();

  const submit = () => {
    if (!canSubmit) return;
    const author = [form.authorName.trim(), form.authorBlock && form.authorFlat ? `${form.authorBlock}-${form.authorFlat}` : form.authorBlock].filter(Boolean).join(", ");
    onAdd({ id:Date.now().toString(), name:form.name, category:form.category, subcategory:form.subcategory, location:form.location, contact:form.contact, note:form.note, recommender:author, upvotes:1, createdAt:new Date().toISOString().split("T")[0], reviews:[] });
    onClose();
  };

  const inputStyle = {width:"100%",padding:"12px 14px",fontSize:15,border:"1.5px solid var(--border)",borderRadius:10,background:"var(--input-bg)",color:"var(--text-primary)",outline:"none",boxSizing:"border-box",transition:"border-color 0.2s"};
  const labelStyle = {display:"block",fontSize:13,fontWeight:600,color:"var(--text-secondary)",marginBottom:6};
  const handle = (f,v) => { if(f==="name") update("authorName",v); else if(f==="block") update("authorBlock",v); else update("authorFlat",v); };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000,animation:"fadeIn 0.2s ease"}} onClick={onClose}>
      <div style={{background:"var(--card-bg)",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto",animation:"slideUp 0.3s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"var(--text-primary)"}}>Add a recommendation</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,color:"var(--text-tertiary)",cursor:"pointer",padding:4}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div><label style={labelStyle}>Business / Provider name *</label>
            <input style={inputStyle} placeholder="e.g. Dr. Vishnu, Srinivas Electricals" value={form.name} onChange={e=>update("name",e.target.value)} onFocus={e=>{e.target.style.borderColor="var(--accent)"}} onBlur={e=>{e.target.style.borderColor="var(--border)"}} /></div>
          <div><label style={labelStyle}>Category</label>
            <select style={{...inputStyle,cursor:"pointer"}} value={form.category} onChange={e=>update("category",e.target.value)}>
              {CATEGORIES.filter(c=>c.id!=="all").map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select></div>
          <div><label style={labelStyle}>Specialty / Type</label>
            <input style={inputStyle} placeholder="e.g. Dermatologist, Plumber" value={form.subcategory} onChange={e=>update("subcategory",e.target.value)} onFocus={e=>{e.target.style.borderColor="var(--accent)"}} onBlur={e=>{e.target.style.borderColor="var(--border)"}} /></div>
          <div><label style={labelStyle}>Location / Address</label>
            <input style={inputStyle} placeholder="e.g. Apollo Clinic, Neeladri Road" value={form.location} onChange={e=>update("location",e.target.value)} onFocus={e=>{e.target.style.borderColor="var(--accent)"}} onBlur={e=>{e.target.style.borderColor="var(--border)"}} /></div>
          <div><label style={labelStyle}>Contact number</label>
            <input style={inputStyle} placeholder="e.g. +91 98765 43210" value={form.contact} onChange={e=>update("contact",e.target.value)} inputMode="tel" onFocus={e=>{e.target.style.borderColor="var(--accent)"}} onBlur={e=>{e.target.style.borderColor="var(--border)"}} /></div>
          <div><label style={labelStyle}>Why do you recommend them?</label>
            <textarea style={{...inputStyle,minHeight:80,resize:"vertical",fontFamily:"inherit"}} placeholder="What was your experience?" value={form.note} onChange={e=>update("note",e.target.value)} onFocus={e=>{e.target.style.borderColor="var(--accent)"}} onBlur={e=>{e.target.style.borderColor="var(--border)"}} /></div>
          <div style={{borderTop:"1px solid var(--border)",paddingTop:4}}>
            <p style={{margin:"0 0 12px",fontSize:14,fontWeight:600,color:"var(--text-primary)"}}>Your details</p>
          </div>
          <NameBlockFields name={form.authorName} block={form.authorBlock} flat={form.authorFlat} onUpdate={handle} inputStyle={inputStyle} labelStyle={labelStyle} />
          <button onClick={submit} disabled={!canSubmit}
            style={{width:"100%",padding:"14px",fontSize:16,fontWeight:600,color:"#fff",background:canSubmit?"var(--accent)":"var(--text-tertiary)",border:"none",borderRadius:12,cursor:canSubmit?"pointer":"not-allowed",opacity:canSubmit?1:0.6,marginTop:4}}>
            Add recommendation
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [recs,setRecs] = useState(SEED_DATA);
  const [filter,setFilter] = useState("all");
  const [search,setSearch] = useState("");
  const [showAdd,setShowAdd] = useState(false);
  const [activeRec,setActiveRec] = useState(null);
  const [loaded,setLoaded] = useState(false);

  // Load from localStorage on mount
  useEffect(()=>{
    try {
      const saved = localStorage.getItem("ll-recs-v2");
      if (saved) setRecs(JSON.parse(saved));
    } catch(e) {}
    setLoaded(true);
  },[]);

  // Save to localStorage whenever recs change
  useEffect(()=>{
    if (!loaded) return;
    try { localStorage.setItem("ll-recs-v2", JSON.stringify(recs)); } catch(e) {}
  },[recs,loaded]);

  const addRec    = useCallback(rec=>setRecs(p=>[rec,...p]),[]);
  const upvote    = useCallback(id=>setRecs(p=>p.map(r=>r.id===id?{...r,upvotes:r.upvotes+1}:r)),[]);
  const addReview = useCallback((recId,review)=>{
    setRecs(p=>p.map(r=>r.id===recId?{...r,reviews:[...(r.reviews||[]),review]}:r));
    setActiveRec(p=>p&&p.id===recId?{...p,reviews:[...(p.reviews||[]),review]}:p);
  },[]);
  const quickVouch = useCallback(recId=>{
    setRecs(p=>p.map(r=>r.id===recId?{...r,upvotes:r.upvotes+1}:r));
    setActiveRec(p=>p&&p.id===recId?{...p,upvotes:p.upvotes+1}:p);
  },[]);

  const catCounts = {};
  recs.forEach(r=>{ catCounts[r.category]=(catCounts[r.category]||0)+1; });
  const sortedCategories = [
    CATEGORIES[0],
    ...CATEGORIES.slice(1).filter(c=>catCounts[c.id]>0).sort((a,b)=>(catCounts[b.id]||0)-(catCounts[a.id]||0)),
    ...CATEGORIES.slice(1).filter(c=>!catCounts[c.id]),
  ];

  const q = search.toLowerCase();
  const filtered = recs
    .filter(r=>filter==="all"||r.category===filter)
    .filter(r=>!q||r.name.toLowerCase().includes(q)||(r.subcategory||"").toLowerCase().includes(q)||(r.location||"").toLowerCase().includes(q)||(r.note||"").toLowerCase().includes(q))
    .sort((a,b)=>b.upvotes-a.upvotes);

  const CSS_VARS = `
    :root {
      --accent:#1A56DB; --card-bg:#FFFFFF; --page-bg:#F5F7FF; --input-bg:#FFFFFF;
      --text-primary:#1A1A18; --text-secondary:#5C5B56; --text-tertiary:#9C9A92;
      --border:#E2E8F4; --border-light:#EEF1F9;
      --tag-bg:#EDE7F6; --tag-text:#5E3A9E;
      --loc-bg:#E8F5E9; --loc-text:#2E7D32;
      --upvote-bg:#EEF3FD; --upvote-border:#C7D8F8; --upvote-hover:#E0EAFC;
      --chip-bg:#EEF1F9; --chip-active-bg:#1A56DB; --chip-active-text:#FFFFFF; --chip-text:#5C5B56;
      --header-bg:#1A56DB; --rec-bg:#F5F7FF;
    }
    @media(prefers-color-scheme:dark){:root{
      --accent:#4D7FE8; --card-bg:#1E2235; --page-bg:#13162B; --input-bg:#252A40;
      --text-primary:#E8EAF4; --text-secondary:#9EA8C8; --text-tertiary:#636A88;
      --border:#2D3350; --border-light:#252A40;
      --tag-bg:#2D2540; --tag-text:#C4A6F0;
      --loc-bg:#1C3020; --loc-text:#7DC882;
      --upvote-bg:#1E2540; --upvote-border:#2D3A5C; --upvote-hover:#253050;
      --chip-bg:#252A40; --chip-active-bg:#4D7FE8; --chip-active-text:#FFFFFF; --chip-text:#9EA8C8;
      --header-bg:#1A3A8F; --rec-bg:#191D30;
    }}
  `;

  return (
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif"}}>
      <style>{CSS_VARS}</style>

      {/* Header */}
      <div style={{background:"var(--header-bg)",padding:"28px 20px 48px",borderRadius:"0 0 24px 24px",position:"relative"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h1 style={{margin:0,fontSize:24,fontWeight:700,color:"#FFFFFF",letterSpacing:"-0.02em"}}>LocalLegends</h1>
            <p style={{margin:"4px 0 0",fontSize:13,color:"rgba(255,255,255,0.75)",fontWeight:500}}>SJR Fiesta Homes · E-City Phase 2</p>
          </div>
          <div style={{background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"6px 12px",fontSize:13,fontWeight:600,color:"#fff"}}>{recs.length} recs</div>
        </div>
        <div style={{position:"absolute",bottom:-22,left:16,right:16}}>
          <input type="text" placeholder="Search doctors, plumbers, events…" value={search} onChange={e=>setSearch(e.target.value)}
            style={{width:"100%",padding:"14px 16px 14px 42px",fontSize:15,border:"1.5px solid var(--border)",borderRadius:14,background:"var(--card-bg)",color:"var(--text-primary)",outline:"none",boxShadow:"0 4px 20px rgba(0,0,0,0.06)",boxSizing:"border-box"}} />
          <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontSize:16,opacity:0.4}}>🔍</span>
        </div>
      </div>

      {/* Category chips */}
      <div style={{marginTop:36,position:"relative"}}>
        <div className="cat-scroll">
          {sortedCategories.map(cat=>{
            const count = cat.id==="all" ? recs.length : (catCounts[cat.id]||0);
            const isEmpty = cat.id!=="all" && count===0;
            return (
              <button key={cat.id} onClick={()=>setFilter(cat.id)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",fontSize:13,fontWeight:600,border:"none",borderRadius:20,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s",opacity:isEmpty?0.4:1,background:filter===cat.id?"var(--chip-active-bg)":"var(--chip-bg)",color:filter===cat.id?"var(--chip-active-text)":"var(--chip-text)"}}>
                <span style={{fontSize:14}}>{cat.icon}</span>
                {cat.label}
                {count>0 && <span style={{fontSize:11,fontWeight:700,minWidth:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:9,padding:"0 5px",background:filter===cat.id?"rgba(255,255,255,0.25)":"var(--border)",color:filter===cat.id?"#fff":"var(--text-tertiary)"}}>{count}</span>}
              </button>
            );
          })}
        </div>
        <div style={{position:"absolute",right:0,top:0,bottom:8,width:40,background:"linear-gradient(to right,transparent,var(--page-bg))",pointerEvents:"none"}} />
      </div>

      {/* Cards */}
      <div style={{padding:"12px 16px 100px",display:"flex",flexDirection:"column",gap:12}}>
        {filtered.length===0
          ? <div style={{textAlign:"center",padding:"48px 20px",color:"var(--text-tertiary)"}}>
              <div style={{fontSize:40,marginBottom:12}}>🏘️</div>
              <p style={{fontSize:16,fontWeight:600,margin:"0 0 6px",color:"var(--text-secondary)"}}>No recommendations found</p>
              <p style={{fontSize:14,margin:0}}>Try a different search or category.</p>
            </div>
          : filtered.map(rec=><RecCard key={rec.id} rec={rec} onUpvote={upvote} onTap={setActiveRec} />)
        }
      </div>

      {/* FAB */}
      <button onClick={()=>setShowAdd(true)}
        style={{position:"fixed",bottom:24,right:24,width:56,height:56,borderRadius:16,background:"var(--accent)",color:"#fff",border:"none",fontSize:28,cursor:"pointer",boxShadow:"0 4px 16px rgba(26,86,219,0.40)",display:"flex",alignItems:"center",justifyContent:"center",transition:"transform 0.15s",zIndex:100}}
        onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.08)"}}
        onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)"}}>+</button>

      {showAdd   && <AddForm onAdd={addRec} onClose={()=>setShowAdd(false)} />}
      {activeRec && <ReviewSheet rec={activeRec} onClose={()=>setActiveRec(null)} onAddReview={addReview} onQuickVouch={quickVouch} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
